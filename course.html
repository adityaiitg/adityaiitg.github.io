<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLSD | Course</title>
    <meta name="description" content="Interactive learning platform for Machine Learning System Design.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@200;400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --secondary: #a855f7;
            --bg: #0f172a;
            --sidebar-bg: rgba(15, 23, 42, 0.85);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --sidebar-width: 300px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            height: 100vh;
        }

        /* Animated Background */
        .bg-blob {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 60%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(100px);
            animation: move 20s infinite alternate;
            opacity: 0.5;
        }

        .blob-1 { top: -20vh; right: -10vw; animation-duration: 25s; }
        .blob-2 { bottom: -20vh; left: -10vw; animation-duration: 30s; background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, transparent 60%); }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.05); }
        }

        /* Sidebar Navigation */
        aside {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .logo-container {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -1px;
            font-family: 'Outfit', sans-serif;
        }

        nav {
            padding: 1.5rem;
            overflow-y: auto;
            flex-grow: 1;
        }

        nav::-webkit-scrollbar {
            width: 5px;
        }
        nav::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .nav-section {
            margin-bottom: 2rem;
        }

        .nav-section h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            font-family: 'Outfit', sans-serif;
        }

        .nav-link {
            display: block;
            padding: 0.6rem 1rem;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 0.25rem;
            opacity: 0.8;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            opacity: 1;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary);
            border-color: rgba(99, 102, 241, 0.3);
            font-weight: 600;
        }

        /* Main Content Area */
        main {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 4rem 10%;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown Rendering Styles */
        h1, h2, h3, h4 { margin-top: 2.5rem; margin-bottom: 1rem; font-family: 'Outfit', sans-serif; color: var(--text-main); }
        h1 { font-size: 3rem; font-weight: 800; line-height: 1.2; letter-spacing: -0.5px; background: linear-gradient(to right, #fff, var(--text-dim)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; margin-bottom: 2rem;}
        h2 { font-size: 2rem; font-weight: 700; color: #fff; }
        h3 { font-size: 1.5rem; color: #e2e8f0; }
        
        p { margin-bottom: 1.25rem; font-size: 1.05rem; color: var(--text-dim); line-height: 1.7; }
        
        ul, ol { margin-bottom: 1.5rem; padding-left: 1.5rem; color: var(--text-dim); font-size: 1.05rem; line-height: 1.7; }
        li { margin-bottom: 0.5rem; }
        li::marker { color: var(--primary); }

        strong { color: #f8fafc; font-weight: 700; }
        
        a { color: var(--primary); text-decoration: none; border-bottom: 1px dashed var(--primary); transition: 0.2s; }
        a:hover { color: var(--secondary); border-bottom-style: solid; }

        blockquote {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.1) 0%, transparent 100%);
            border-left: 4px solid var(--primary);
            padding: 1.5rem;
            border-radius: 0 12px 12px 0;
            margin: 2rem 0;
            color: #cbd5e1;
            font-style: italic;
        }

        blockquote p:last-child { margin-bottom: 0; }

        pre {
            background: #0b1120;
            padding: 1.5rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 2rem 0;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        
        code {
            font-family: 'Fira Code', monospace;
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            color: #d8b4fe;
            font-size: 0.9em;
        }

        pre code { background: transparent; padding: 0; color: #e2e8f0; font-size: 0.95rem; }

        /* Navigation Buttons */
        .page-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .nav-btn:hover { background: rgba(99, 102, 241, 0.1); border-color: var(--primary); transform: translateY(-2px); }

        /* Mobile Toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 1.5rem;
            box-shadow: 0 10px 20px -5px var(--primary-glow);
            z-index: 200;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            aside { transform: translateX(-100%); width: 280px; }
            aside.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
            main { margin-left: 0; padding: 2rem 5%; }
            .mobile-toggle { display: flex; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <aside id="sidebar">
        <div class="logo-container">
            <a href="index.html" class="logo">MLSD.IO</a>
        </div>
        <nav id="sidebar-nav">
            <!-- Sidebar injected by JS -->
        </nav>
    </aside>

    <button class="mobile-toggle" onclick="toggleSidebar()">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>

    <main>
        <div class="content-container">
            <div id="content">Loading chapter...</div>
            <div class="page-navigation" id="page-nav">
                <!-- Navigation buttons injected by JS -->
            </div>
        </div>
    </main>

    <script>
        let sidebarData = [];
        let flatItems = [];

        async function init() {
            try {
                // Fetch sidebar configuration
                const sbRes = await fetch('chapters/sidebar.json');
                sidebarData = await sbRes.json();
                
                // Flatten items for prev/next navigation
                flatItems = sidebarData.flatMap(section => section.items);

                // Build sidebar
                const navEl = document.getElementById('sidebar-nav');
                const urlParams = new URLSearchParams(window.location.search);
                const currentFile = urlParams.get('file') || flatItems[0].id;

                sidebarData.forEach(section => {
                    const secDiv = document.createElement('div');
                    secDiv.className = 'nav-section';
                    
                    const secTitle = document.createElement('h4');
                    secTitle.textContent = section.section;
                    secDiv.appendChild(secTitle);
                    
                    section.items.forEach(item => {
                        const link = document.createElement('a');
                        link.href = `?file=${item.id}`;
                        link.className = 'nav-link' + (item.id === currentFile ? ' active' : '');
                        link.textContent = item.title;
                        secDiv.appendChild(link);
                    });
                    
                    navEl.appendChild(secDiv);
                });

                // Load content
                await loadChapter(currentFile);

            } catch (err) {
                console.error(err);
                document.getElementById('content').innerHTML = `<h1 style="color: #ef4444">Error loading course data</h1><p>${err.message}</p>`;
            }
        }

        async function loadChapter(chapterId) {
            try {
                const response = await fetch(`chapters/${chapterId}.md`);
                if (!response.ok) throw new Error(`Could not find chapter: ${chapterId}`);
                
                const text = await response.text();
                // Configure marked to use standard GitHub formatting
                marked.setOptions({
                    gfm: true,
                    breaks: true
                });
                
                document.getElementById('content').innerHTML = marked.parse(text);

                // Update page title based on first h1
                const firstH1 = text.match(/^#\s+(.+)$/m);
                if (firstH1) {
                     document.title = firstH1[1] + " | MLSD Course";
                }

                // Update prev/next buttons
                const currentIndex = flatItems.findIndex(i => i.id === chapterId);
                const navContainer = document.getElementById('page-nav');
                navContainer.innerHTML = '';

                if (currentIndex > 0) {
                    const prev = flatItems[currentIndex - 1];
                    navContainer.innerHTML += `<a href="?file=${prev.id}" class="nav-btn">← Previous: ${prev.title}</a>`;
                } else {
                    navContainer.innerHTML += `<div></div>`;
                }

                if (currentIndex < flatItems.length - 1) {
                    const next = flatItems[currentIndex + 1];
                    navContainer.innerHTML += `<a href="?file=${next.id}" class="nav-btn">Next: ${next.title} →</a>`;
                }

                // Scroll to top
                window.scrollTo(0, 0);

            } catch (err) {
                 document.getElementById('content').innerHTML = `
                    <h1>Under Construction</h1>
                    <p>The detailed content for this section is currently being written.</p>
                    <p>Error details: ${err.message}</p>
                 `;
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Initialize App
        init();
    </script>
</body>
</html>
